<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playwright Locators Practice</title>
    <style>
      body {
        font-family: Georgia, "Times New Roman", serif;
        margin: 0;
        background: #f5f1e8;
        color: #1f2a28;
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      section {
        border-top: 10px solid #4d0404;
        padding: 28px 0;
      }

      .notice {
        background: #d8efe6;
        border-left: 5px solid #2f7d64;
        padding: 16px;
      }

      button {
        background: #1f2a28;
        border: 0;
        color: white;
        cursor: pointer;
        padding: 10px 16px;
      }

      img {
        display: block;
        height: 72px;
        margin-bottom: 16px;
        width: 72px;
      }

      label {
        display: block;
        font-weight: 700;
        margin: 12px 0 6px;
      }

      input {
        border: 1px solid #9d927d;
        box-sizing: border-box;
        display: block;
        font: inherit;
        padding: 10px;
        width: min(100%, 360px);
      }
    </style>
  </head>
  <body>
    <main>
      <img
        alt="Locator practice logo"
        src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 72 72'%3E%3Crect width='72' height='72' fill='%232f7d64'/%3E%3Ccircle cx='36' cy='36' r='20' fill='%23f5f1e8'/%3E%3C/svg%3E"
      />
      <h1>Playwright Locators Practice</h1>

      <section>
        <h2>Text Locator</h2>
        <p>Welcome to the locator practice page.</p>
        <p class="notice">Order placed successfully.</p>
        <button>Continue shopping</button>
      </section>

      <section>
        <h2>Repeated Text</h2>
        <p>Product status: Available</p>
        <p>Store status: Available</p>
      </section>

      <section>
        <h2>Label Locator</h2>
        <label for="first-name">First name:</label>
        <input id="first-name" type="text" />

        <label for="last-name">Last name:</label>
        <input id="last-name" type="text" />

        <label for="email">Email:</label>
        <input id="email" type="email" />
      </section>
    </main>
  </body>
</html>
